---
name: run wordpuzzle

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      SIZE:
        description: "Minimum word size"
        required: false
        default: "4"
        type: string
      LETTERS:
        description: "Letters to use"
        required: true
        type: string
      MANDATORY:
        description: "Mandatory letter"
        required: true
        type: string
      REPEATS:
        description: "Allow repeated letters"
        required: false
        default: true
        type: boolean

jobs:
  run-wordpuzzle:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Download release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "wordpuzzle-release.tar.gz"
          tar -xzf wordpuzzle-release.tar.gz
          echo "EXE_PATH=$(pwd)/wordpuzzle" >> "$GITHUB_ENV"

      - name: Prepare inputs
        env:
          SIZE: ${{ inputs.SIZE }}
          LETTERS: ${{ inputs.LETTERS }}
          MANDATORY: ${{ inputs.MANDATORY }}
        run: |
          # Extract leading integer component from SIZE
          echo "SIZE_INT=${SIZE%%[^0-9]*}" >> "$GITHUB_ENV"
          # Normalize letters to lowercase
          echo "LETTERS_LOWER=${LETTERS,,}" >> "$GITHUB_ENV"
          # Normalize mandatory to lowercase
          echo "MANDATORY_LOWER=${MANDATORY,,}" >> "$GITHUB_ENV"

      - name: Run main with size ${{ env.SIZE_INT }}, mandatory ${{ env.MANDATORY_LOWER }}, letters ${{ env.LETTERS_LOWER }}, repeats ${{ inputs.REPEATS }}
        env:
          REPEATS: ${{ inputs.REPEATS }}
        run: |
          # Build argument array
          ARGS=("-s" "$SIZE_INT" "-m" "$MANDATORY_LOWER" "-l" "$LETTERS_LOWER")
          # Add repeats flag if true
          [[ "$REPEATS" = "true" ]] && ARGS+=("-r")
          # Run the executable with the appropriate arguments
          ${{ env.EXE_PATH }} -d ./dictionary "${ARGS[@]}"
